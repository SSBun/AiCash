title: AiCash
description: Smart AI Usage Tracker for macOS
github_repo: SSBun/AiCash
theme: minima

# Build settings
markdown: kramdown
permalink: /:title/

# Exclude unnecessary files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Default values
defaults:
  - scope:
      path: ""
    values:
      layout: default
